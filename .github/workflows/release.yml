name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    continue-on-error: ${{ matrix.optional || false }}
    timeout-minutes: ${{ matrix.timeout_minutes || 60 }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # macOS — native runners
          - os: macos-latest   # arm64 (macos-14+)
            target: aarch64-apple-darwin
            use_cross: false
          - os: macos-13       # x86_64 — Intel runners are sometimes unavailable; skip rather than block the release
            target: x86_64-apple-darwin
            use_cross: false
            optional: true
            timeout_minutes: 45

          # Linux x86_64 — native runner
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            use_cross: false

          # Linux x86_64 musl (static, Alpine / containers)
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            use_cross: true

          # Linux ARM64 (AWS Graviton, RPi 4+, cloud ARM)
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            use_cross: true

          # Linux ARM64 musl (static ARM64)
          - os: ubuntu-latest
            target: aarch64-unknown-linux-musl
            use_cross: true

          # Linux ARMv7 (Raspberry Pi 2/3, 32-bit ARM)
          - os: ubuntu-latest
            target: armv7-unknown-linux-gnueabihf
            use_cross: true

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Install cross
        if: matrix.use_cross
        uses: taiki-e/install-action@v2
        with:
          tool: cross

      - name: Build
        run: ${{ matrix.use_cross && 'cross' || 'cargo' }} build --release --target ${{ matrix.target }}

      - name: Stage artifact
        run: cp target/${{ matrix.target }}/release/tlink tlink-${{ matrix.target }}

      - uses: actions/upload-artifact@v4
        with:
          name: tlink-${{ matrix.target }}
          path: tlink-${{ matrix.target }}

  release:
    name: Publish release
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Checksums
        run: |
          cd artifacts
          sha256sum tlink-* > checksums.txt
          cat checksums.txt

      - uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/tlink-*
            artifacts/checksums.txt
          generate_release_notes: true
