name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2

      - name: Install system deps (tmux for integration tests)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq tmux python3

      - name: fmt
        run: cargo fmt --check

      - name: clippy
        run: cargo clippy -- -D warnings

      - name: Start tmux session for integration tests
        run: |
          tmux new-session -d -s ci-test 2>/dev/null || true
          tmux rename-window -t ci-test:0 test-window 2>/dev/null || true

      # Build everything first (binary + test binaries) without running
      - name: Compile all targets
        run: cargo test --no-run -- --test-threads=4 2>&1

      # Run the test binary directly — avoids cargo lock conflicts when
      # tests spawn `tlink notify` via the binary
      - name: Find and run integration test binary
        run: |
          TEST_BIN=$(find target/debug -maxdepth 1 -name 'integration-*' -type f | head -1)
          echo "Test binary: $TEST_BIN"
          $TEST_BIN --test-threads=4

      - name: Clean up tmux
        if: always()
        run: tmux kill-session -t ci-test 2>/dev/null || true
