name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2

      - name: Install system deps (tmux for integration tests)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq tmux python3

      - name: fmt
        run: cargo fmt --check

      - name: clippy
        run: cargo clippy -- -D warnings

      - name: Start tmux session for integration tests
        run: |
          tmux new-session -d -s ci-test 2>/dev/null || true
          tmux rename-window -t ci-test:0 test-window 2>/dev/null || true

      # Build the main binary separately (avoids test-harness transformation)
      - name: Build main binary
        run: cargo build --bin tlink

      # Run unit tests (using cargo test, no subprocess spawning needed)
      - name: Run unit tests
        run: cargo test --bin tlink

      # Build and run integration tests separately
      # Note: must NOT combine build & test in one cargo invocation because
      # tlink_cargo would become a test harness binary (Command::new fails)
      - name: Build integration tests
        run: cargo test --test integration --no-run

      - name: Run integration tests
        run: |
          INTEG_BIN=$(find target/debug/deps -name 'integration-*' -type f ! -name '*.d' | head -1)
          echo "Integration test binary: $INTEG_BIN"
          $INTEG_BIN --test-threads=4

      - name: Clean up tmux
        if: always()
        run: tmux kill-session -t ci-test 2>/dev/null || true
