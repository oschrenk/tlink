name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2

      - name: Install system deps (tmux for integration tests)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq tmux python3

      - name: fmt
        run: cargo fmt --check

      - name: clippy
        run: cargo clippy -- -D warnings

      - name: Start tmux session for integration tests
        run: |
          tmux new-session -d -s ci-test 2>/dev/null || true
          tmux rename-window -t ci-test:0 test-window 2>/dev/null || true

      - name: Run all tests (builds binary + integration tests in one cargo invocation)
        run: cargo test -- --test-threads=4

      - name: Clean up tmux
        if: always()
        run: tmux kill-session -t ci-test 2>/dev/null || true
