name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2

      - name: Install system deps (tmux for integration tests)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq tmux python3

      - name: fmt
        run: cargo fmt --check

      - name: clippy
        run: cargo clippy -- -D warnings

      - name: Start tmux session for integration tests
        run: |
          tmux new-session -d -s ci-test 2>/dev/null || true
          tmux rename-window -t ci-test:0 test-window 2>/dev/null || true

      # Build all test targets without running them
      - name: Compile all targets
        run: cargo test --no-run 2>&1

      # Run unit tests via the binary (no cargo lock needed)
      - name: Run unit tests
        run: cargo test --bin tlink

      # Run integration test binary directly to avoid cargo lock
      # conflicts (integration tests spawn tlink notify subprocess)
      - name: Run integration tests
        run: |
          INTEG_BIN=$(find target/debug/deps -name 'integration-*' -type f ! -name '*.d' | head -1)
          echo "Integration test binary: $INTEG_BIN"
          $INTEG_BIN --test-threads=4

      - name: Clean up tmux
        if: always()
        run: tmux kill-session -t ci-test 2>/dev/null || true
